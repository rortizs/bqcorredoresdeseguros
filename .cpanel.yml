---
deployment:
  tasks:
    - /bin/cp -R public/* /home/qbocorredoresdes/public_html/
    - /bin/cp public/.htaccess /home/qbocorredoresdes/public_html/.htaccess
    - /bin/sed -i "s|__DIR__.'/../vendor|__DIR__.'/../repositories/bqcorredoresdeseguros/vendor|g" /home/qbocorredoresdes/public_html/index.php
    - /bin/sed -i "s|__DIR__.'/../bootstrap|__DIR__.'/../repositories/bqcorredoresdeseguros/bootstrap|g" /home/qbocorredoresdes/public_html/index.php
    - /bin/cp .env.production /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/.env
    - /bin/chmod -R 775 /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/storage
    - /bin/chmod -R 775 /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/bootstrap/cache
    - /bin/mkdir -p /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/storage/framework/sessions
    - /bin/mkdir -p /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/storage/framework/views
    - /bin/mkdir -p /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/storage/framework/cache/data
    - /bin/mkdir -p /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/storage/logs
    - /bin/rm -rf /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/storage/framework/views/*.php
    - /bin/rm -rf /home/qbocorredoresdes/repositories/bqcorredoresdeseguros/bootstrap/cache/*.php
